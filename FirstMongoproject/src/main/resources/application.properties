spring.application.name=FirstMongoproject

# MongoDB Configuration
spring.data.mongodb.uri=mongodb+srv://admin:admin@cluste.rlanx3u.mongodb.net/Incresol?retryWrites=true&w=majority
spring.data.mongodb.ssl.enabled=true

# JWT Configuration
jwt.secret=MySecretKeyMySecretKeyMySecretKey123456789
jwt.expiration=86400000

# Server Port (Dynamic for Cloud, 8080 for Local)
server.port=${PORT:8080}

# Mail Configuration (SendGrid - SMTPS for Cloud)
spring.mail.protocol=smtps
spring.mail.host=smtp.sendgrid.net
spring.mail.port=465
spring.mail.username=apikey
spring.mail.password=${SENDGRID_API_KEY}
spring.mail.properties.mail.smtps.auth=true
spring.mail.properties.mail.smtps.ssl.enable=true
spring.mail.properties.mail.smtps.ssl.trust=smtp.sendgrid.net
spring.mail.properties.mail.smtps.timeout=30000
spring.mail.properties.mail.smtps.connectiontimeout=30000
spring.mail.properties.mail.debug=true

# Verified Sender Email (Must match SendGrid configuration)
app.mail.sender=stepforwardx.hr@gmail.com

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB