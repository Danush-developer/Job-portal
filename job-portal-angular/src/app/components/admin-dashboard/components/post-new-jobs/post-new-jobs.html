<div class="view-container animate-fade-in">
  <div class="content-header">
    <div class="greeting">
      <h1>{{ editingJob ? 'Edit Job' : 'Post New Job' }}</h1>
    </div>
    <button class="btn btn-secondary" (click)="onCancel()">Back</button>
  </div>
  <div class="form-card card">
    <form (ngSubmit)="onSubmitJob()">
       <div class="form-grid">
        <div class="input-group">
          <label>Job Title</label>
          <input type="text" name="title" [(ngModel)]="jobForm.title" required>
        </div>
        <div class="input-group">
          <label>Job Active From</label>
          <input type="datetime-local" name="startDate" [(ngModel)]="jobForm.startDate" required>
        </div>
        <div class="input-group">
          <label>Job Active Until</label>
          <input type="datetime-local" name="endDate" [(ngModel)]="jobForm.endDate" required>
        </div>
        <div class="input-group">
          <label>Company</label>
          <input type="text" name="company" [(ngModel)]="jobForm.company" required>
        </div>
        <div class="input-group">
          <label>Location</label>
          <input type="text" name="location" [(ngModel)]="jobForm.location" placeholder="e.g. Remote, New York" required>
        </div>
        <div class="input-group">
          <label>Job Type</label>
          <select name="jobType" [(ngModel)]="jobForm.jobType" required>
            <option value="Full-time">Full-time</option>
            <option value="Part-time">Part-time</option>
            <option value="Contract">Contract</option>
            <option value="Remote">Remote</option>
          </select>
        </div>
        <div class="input-group">
          <label>Experience Level</label>
          <input type="text" name="exp" [(ngModel)]="jobForm.experienceLevel" placeholder="e.g. 2-5 years">
        </div>
        <div class="input-group">
          <label>Salary Range</label>
          <input type="text" name="salary" [(ngModel)]="jobForm.salary" placeholder="e.g. $80k - $120k">
        </div>
      </div>
      <div class="input-group full-width">
        <label>Required Skills (Comma separated)</label>
        <input type="text" name="skills" [(ngModel)]="jobForm.requiredSkills" placeholder="Java, Angular, Spring Boot">
      </div>
      <div class="input-group full-width">
        <label>Description</label>
        <textarea name="description" [(ngModel)]="jobForm.description" rows="4" placeholder="Describe the role and responsibilities..."></textarea>
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-secondary" (click)="onCancel()">Cancel</button>
        <button type="submit" class="btn btn-primary">Save Job</button>
      </div>
    </form>
  </div>
</div>
