<div class="login-container animate-in">
  <div class="glass-card login-card">
    <div class="login-header">
      <h1>Reset Password</h1>
      <p>Enter the 6-digit OTP from your email and your new password</p>
    </div>

    <form (submit)="onSubmit()">
      <div class="input-group">
        <label>OTP Code (from Email)</label>
        <input type="text" name="token" [(ngModel)]="data.token" placeholder="Enter 6-digit code" required maxlength="6">
      </div>

      <div class="input-group">
        <label>New Password</label>
        <input type="password" name="newPassword" [(ngModel)]="data.newPassword" placeholder="••••••••" required>
      </div>

      <div class="input-group">
        <label>Confirm Password</label>
        <input type="password" name="confirmPassword" [(ngModel)]="data.confirmPassword" placeholder="••••••••" required>
      </div>

      <div *ngIf="message" class="success-msg">
        {{ message }}
      </div>

      <div *ngIf="error" class="error-msg">
        {{ error }}
      </div>

      <button type="submit" class="btn btn-primary w-full" [disabled]="loading">
        <span *ngIf="!loading">Update Password</span>
        <span *ngIf="loading">Updating...</span>
      </button>
    </form>

    <div class="login-footer">
      <p>Back to <a routerLink="/login">Login</a></p>
    </div>
  </div>
</div>
