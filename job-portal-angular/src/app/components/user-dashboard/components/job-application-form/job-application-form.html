<div class="form-container">
  <div class="card">
    <header class="form-header">
      <button class="btn-icon" (click)="onCancel()"><i class="fas fa-arrow-left"></i></button>
      <div>
        <h2>Apply for {{ selectedJob?.title }}</h2>
        <p>Fill in the details below to submit your application.</p>
      </div>
    </header>
    
    <form (submit)="onSubmit()" class="job-form">
      <div class="form-grid">
        <div class="input-group">
          <label>Full Name</label>
          <input type="text" name="name" [(ngModel)]="applicationForm.employeeName" placeholder="e.g. John Doe" required>
        </div>
        <div class="input-group">
          <label>Email Address</label>
          <input type="email" name="email" [(ngModel)]="applicationForm.employeeEmail" placeholder="john@example.com" required>
        </div>
        <div class="input-group">
          <label>Phone Number</label>
          <input type="text" name="phone" [(ngModel)]="applicationForm.phone" placeholder="+1 (555) 000-0000" required>
        </div>
      </div>
      
      <div class="input-group">
        <label>Skills</label>
        <textarea name="skills" [(ngModel)]="applicationForm.skills" placeholder="List your key skills..." required></textarea>
      </div>

      <div class="input-group full-width">
        <label>Upload Resume (PDF/Doc)</label>
        <div class="file-upload-wrapper" style="border: 2px dashed #e2e8f0; padding: 2rem; border-radius: 12px; text-align: center; cursor: pointer;" (click)="triggerFileInput()">
          <i class="fas fa-cloud-upload-alt" style="font-size: 2rem; color: #6366f1; margin-bottom: 1rem;"></i>
          <p style="margin: 0; color: #64748b;">{{ selectedFile ? selectedFile.name : 'Click to select or drag and drop your resume' }}</p>
          <input #fileInput type="file" (change)="onFileSelected($event)" style="display: none;" accept=".pdf,.doc,.docx">
        </div>
      </div>

      <div class="input-group">
        <label>Profile Summary / Cover Letter</label>
        <textarea name="resume" [(ngModel)]="applicationForm.resume" rows="4" placeholder="Briefly describe why you are a good fit..."></textarea>
      </div>

      <div class="form-footer">
        <button type="button" class="btn btn-outline" (click)="onCancel()">Cancel</button>
        <button type="submit" class="btn btn-primary" [disabled]="isUploading">
          <i class="fas" [class.fa-spinner]="isUploading" [class.fa-spin]="isUploading" [class.fa-paper-plane]="!isUploading"></i>
          {{ isUploading ? 'Uploading...' : 'Submit Application' }}
        </button>
      </div>
    </form>
  </div>
</div>
