<div class="login-container animate-in">
  <div class="glass-card login-card">
    <div class="login-header">
      <h1 *ngIf="step() === 1">Forgot Password</h1>
      <h1 *ngIf="step() === 2">Reset Password</h1>
      <p *ngIf="step() === 1">Enter your email to receive a 6-digit OTP</p>
      <p *ngIf="step() === 2">Enter the OTP from your email and your new password</p>
    </div>

    <!-- Step 1: Request OTP -->
    <form *ngIf="step() === 1" (submit)="sendOTP()">
      <div class="input-group">
        <label>Email Address</label>
        <input type="email" name="email" [(ngModel)]="email" placeholder="name@company.com" required>
      </div>

      <div *ngIf="error()" class="error-msg">
        {{ error() }}
      </div>

      <button type="submit" class="btn btn-primary w-full" [disabled]="loading()">
        <span *ngIf="!loading()">Send OTP</span>
        <span *ngIf="loading()">Sending...</span>
      </button>
    </form>

    <!-- Step 2: Reset Password -->
    <form *ngIf="step() === 2" (submit)="resetPassword()">
      <div class="input-group">
        <label>OTP Code (from Email)</label>
        <input type="text" name="otp" [(ngModel)]="otp" placeholder="Enter 6-digit code" required maxlength="6">
      </div>

      <div class="input-group">
        <label>New Password</label>
        <input type="password" name="newPassword" [(ngModel)]="newPassword" placeholder="••••••••" required>
      </div>

      <div class="input-group">
        <label>Confirm Password</label>
        <input type="password" name="confirmPassword" [(ngModel)]="confirmPassword" placeholder="••••••••" required>
      </div>

      <div *ngIf="message()" class="success-msg">
        {{ message() }}
      </div>

      <div *ngIf="error()" class="error-msg">
        {{ error() }}
      </div>

      <button type="submit" class="btn btn-primary w-full" [disabled]="loading()">
        <span *ngIf="!loading()">Reset Password</span>
        <span *ngIf="loading()">Resetting...</span>
      </button>
    </form>

    <div class="login-footer">
      <p>Remembered your password? <a routerLink="/login">Back to Login</a></p>
    </div>
  </div>
</div>
